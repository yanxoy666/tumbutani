<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="assets/css/galeri.css">
</head>

<body class="company-mode">

<!-- NAVBAR (TETAP) -->
<div id="navbar"></div>

<div class="galeri-wrap">

  <!-- HERO -->
  <div class="galeri-hero">
    <h1>Galeri <em>TumbuTani</em></h1>
    <p>Momen terbaik dari proses pertanian kami.</p>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterGaleri(this,'all')">Semua</button>
    <button class="filter-btn" onclick="filterGaleri(this,'panen')">Panen</button>
    <button class="filter-btn" onclick="filterGaleri(this,'lahan')">Lahan</button>
    <button class="filter-btn" onclick="filterGaleri(this,'petani')">Petani</button>
    <button class="filter-btn" onclick="filterGaleri(this,'video')">Video</button>
  </div>

  <!-- GRID -->
  <div class="galeri-grid">

    <div class="galeri-item" data-cat="panen" onclick="openLb(0)">
      <img src="assets/img/Panencabai.png">
      <span class="item-tag">Panen</span>
      <div class="item-overlay">
        <h3>Panen Bersama</h3>
        <p>Cabai segar berkualitas tinggi</p>
      </div>
    </div>

    <div class="galeri-item" data-cat="lahan" onclick="openLb(1)">
      <img src="assets/img/lahan.png">
      <span class="item-tag">Lahan</span>
      <div class="item-overlay">
        <h3>Lahan Pertanian</h3>
        <p>Lahan subur modern</p>
      </div>
    </div>

    <div class="galeri-item" data-cat="petani" onclick="openLb(2)">
      <img src="assets/img/petanimenanam.png">
      <span class="item-tag">Petani</span>
      <div class="item-overlay">
        <h3>Kegiatan Petani</h3>
        <p>Proses penanaman</p>
      </div>
    </div>

    <div class="galeri-item" data-cat="lahan" onclick="openLb(3)">
      <img src="assets/img/Lahan2.png">
      <span class="item-tag">Lahan</span>
      <div class="item-overlay">
        <h3>Siap Panen</h3>
        <p>Hasil optimal</p>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="galeri-item" data-cat="video" onclick="openVideo()">
      <img src="assets/img/thumbnail-video.jpg">
      <span class="item-tag">Video</span>
      <div class="video-play-btn">▶</div>
      <div class="item-overlay">
        <h3>Video Kegiatan</h3>
        <p>Klik untuk menonton</p>
      </div>
    </div>

  </div>
</div>

<!-- LIGHTBOX GAMBAR -->
<div class="lb" id="lb" onclick="closeLb(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <img id="lbImg">
    <div class="lb-caption">
      <h3 id="lbTitle"></h3>
      <p id="lbDesc"></p>
    </div>
  </div>
</div>

<!-- LIGHTBOX VIDEO -->
<div class="lb" id="videoLb" onclick="closeVideo(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeVideo()">✕</button>
    <video id="videoPlayer" controls>
      <source src="assets/video/tumbutani.mp4">
    </video>
  </div>
</div>

<script src="assets/js/navbar.js"></script>
<script src="assets/js/galeri.js"></script>

</body>
</html>
